<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="AD portfolio icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <!-- Dark blue gradient background -->
      <stop offset="0%" stop-color="#050b1a"/>
      <stop offset="55%" stop-color="#0b2a5a"/>
      <stop offset="100%" stop-color="#0f4c81"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- Code brackets + slash: a minimal "developer" mark -->
  <g filter="url(#soft)" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- left bracket (<) -->
    <path d="M28 22 L18 32 L28 42"/>
    <!-- right bracket (>) -->
    <path d="M36 22 L46 32 L36 42"/>
    <!-- slash (/) -->
    <path d="M34 20 L30 44"/>
  </g>

  <!-- Accent dot (represents the cursor / "you are here") -->
  <circle cx="50" cy="18" r="3.5" fill="#0b1220" opacity="0.35"/>
  <circle cx="50" cy="18" r="2.5" fill="#fbbf24"/>
</svg>
